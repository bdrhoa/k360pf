server:
  port: ${PORT:8080}

kount360:
  auth-token-url: ${KOUNT_AUTH_TOKEN_URL:${K360_AUTH_TOKEN_URL:https://login-uat.equifax.com/as/token}}
  api-base-url: ${KOUNT_API_BASE_URL:${K360_API_BASE_URL:https://api-sandbox.kount.com}}
  client-id: ${KOUNT_CLIENT_ID:${K360_CLIENT_ID:}}
  api-key: ${KOUNT_API_KEY:${K360_API_KEY:}}
  auth-scope: ${KOUNT_AUTH_SCOPE:${K360_AUTH_SCOPE:k1_integration_api}}
  public-key: ${KOUNT_PUBLIC_KEY:${K360_PUBLIC_KEY:}}
  merchant-id: ${KOUNT_MERCHANT_ID:${K360_MERCHANT_ID:}}
  channel: ${KOUNT_CHANNEL:${K360_CHANNEL:DEFAULT}}

  signature-header: ${KOUNT_SIGNATURE_HEADER:${K360_SIGNATURE_HEADER:X-Kount-Signature}}
  key-id-header: ${KOUNT_KEY_ID_HEADER:${K360_KEY_ID_HEADER:X-Kount-Key-Id}}
  public-key-pem: ${KOUNT_PUBLIC_KEY_PEM:${K360_PUBLIC_KEY_PEM:}}
  public-key-url: ${KOUNT_PUBLIC_KEY_URL:${K360_PUBLIC_KEY_URL:}}
  public-key-refresh-minutes: ${KOUNT_PUBLIC_KEY_REFRESH_MINUTES:${K360_PUBLIC_KEY_REFRESH_MINUTES:60}}
logging:
  file:
    name: logs/kount.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
